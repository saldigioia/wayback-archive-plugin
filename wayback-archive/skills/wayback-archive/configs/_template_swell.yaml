# Auto-generated from _template_swell.yaml by scripts/bootstrap.py
# Platform: Swell Commerce (SvelteKit-based)
# Target: {DISPLAY_NAME}
#
# NOTE: Swell requires the `devalue` npm lib to parse __data.json payloads.
# Install via `npm i devalue` inside the project before running `fetch`.

name: {NAME}
display_name: "{DISPLAY_NAME}"
credit_line: "{DISPLAY_NAME}"

domains:
{DOMAINS}

project_dir: .

cdx_dump_max_age_days: 7
cdx_dump_proxy_mode: auto

url_rules:
  - path_prefix: "/products/"
    url_type: slug
    require_status: "200"
    require_ctype:
      - "text/html"
      - "application/json"

  - path_suffix: "/__data.json"
    url_type: api
    require_status: "200"
    require_ctype: "application/json"

junk_patterns:
  - '%22|%3[CcEe]|%7[Bb]|%5[Bb]|%0A'
  - 'undefined|:productId|\[insert'
  - '\.js$'

era_rules:
  - condition: "default"
    era: swell

type_priority:
  - api
  - slug

cdn_patterns:
  - name: swell
    regex: 'https?://cdn\.swell\.store/[^\s"''\\]+\.(?:png|jpg|jpeg|webp|gif|avif)'

# No shopify_cdn — not a Shopify store
shopify_cdn:
  enabled: false

alternative_archives:
  enabled: true
  sources:
    - archive_today
    - memento

download_cascade:
  - direct_fetch
  - wayback_cdx_best
  - exhaustive
  - asset_rescue
