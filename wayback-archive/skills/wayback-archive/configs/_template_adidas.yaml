# Auto-generated from _template_adidas.yaml by scripts/bootstrap.py
# Platform: Adidas (SPA / API-first)
# Target: {DISPLAY_NAME}
#
# NOTE: Adidas pages are React app shells — HTML is empty. Always drain the
# /api/products/{SKU} JSON endpoints first.

name: {NAME}
display_name: "{DISPLAY_NAME}"
credit_line: "{DISPLAY_NAME}"

domains:
{DOMAINS}

project_dir: .

cdx_dump_max_age_days: 7
cdx_dump_proxy_mode: auto

url_rules:
  - path_prefix: "/api/products/"
    url_type: api
    require_status: "200"
    require_ctype:
      - "application/json"
      - "text/html"

  - path_prefix: "/products/"
    url_type: slug
    require_status: "200"
    require_ctype: "text/html"

junk_patterns:
  - '%22|%3[CcEe]|%7[Bb]|%5[Bb]'
  - 'undefined|:productId'
  - '\.js$'

era_rules:
  - condition: "url_type == 'api'"
    era: adidas_api
  - condition: "default"
    era: adidas_web

type_priority:
  - api
  - slug

cdn_patterns:
  - name: adidas_assets
    regex: 'https?://assets\.adidas\.com/images/[^\s"''\\]+\.(?:png|jpg|jpeg|webp|gif|avif)'

shopify_cdn:
  enabled: false

alternative_archives:
  enabled: true
  sources:
    - archive_today
    - memento

download_cascade:
  - direct_fetch
  - wayback_cdx_best
  - exhaustive
  - asset_rescue
