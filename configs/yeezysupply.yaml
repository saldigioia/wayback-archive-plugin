name: ys
display_name: "Yeezy Supply"
credit_line: "Yeezy Supply"

domains:
  - yeezysupply.com
  - www.yeezysupply.com
  - shop.yeezysupply.com
  - checkout.yeezysupply.com

cdx_files:
  - /Users/salvatore/Downloads/wayback_cdx_v2/yeezysupply_com_wayback.txt

project_dir: /Users/salvatore/Downloads/yeezy_supply
transport_pkg: /Users/salvatore/Downloads/wayback_cdx_v2
cdn_tool: /Users/salvatore/downloads/cdn/app.sh

# Stage 1: URL classification
url_rules:
  - path_prefix: "/api/products/"
    url_type: api
    require_status: "200"
    require_ctype:
      - "application/json"
      - "text/html"

  - path_prefix: "/product/"
    url_type: sku
    require_status: "200"
    require_ctype: "text/html"

  - path_suffix: ".json"
    url_type: json_api
    require_status: "200"
    require_ctype:
      - "application/json"
      - "text/html"

  - path_suffix: ".atom"
    url_type: atom_feed
    require_status: "200"

  - path_suffix: ".oembed"
    url_type: oembed
    require_status: "200"
    require_ctype:
      - "application/json+oembed"
      - "application/json"

  - path_prefix: "/hpl/content/"
    url_type: availability_api
    require_status: "200"

  - path_prefix: "/products/"
    url_type: slug
    require_status: "200"
    require_ctype: "text/html"

  - path_contains: "/collections/*/products/"
    url_type: collection
    require_status: "200"
    require_ctype: "text/html"

junk_patterns:
  - '%22|%3[CcEe]|%7[Bb]|%5[Bb]|\[insert|:productId'

# Stage 1: Era detection
era_rules:
  - condition: "url_type == 'api'"
    era: adidas_api
  - condition: "url_type == 'sku'"
    era: adidas_spa
  - condition: "timestamp_year <= 2017"
    era: early_shopify
  - condition: "default"
    era: late_shopify

type_priority:
  - api
  - slug
  - collection
  - sku

# Stage 2: CDN patterns
cdn_patterns:
  - name: shopify
    regex: 'https?://cdn\.shopify\.com/s/files/[^\s"''\\]+/products/[^\s"''\\]+'
    size_strip: '_(?:\d+|\{width\})x(?:@\dx)?(?=\.\w+)'
    named_size_strip: '_(?:grande|medium|small|large|compact|master|pico|icon|thumb)(?=\.\w+)'
  - name: adidas
    regex: 'https?://assets\.yeezysupply\.com/images/[^\s"''\\)]+\.(png|jpg|jpeg|webp)'

# Stage 2: Catalog API patterns
catalog_api_patterns:
  - "/api/yeezysupply/products/bloom"
  - "/api/yeezysupply/products/archive"
  - "/api/yeezysupply/products"
  - "/products.json"
  - "/products.json?limit=1000"
  - "/archive.json"
  - "/cart.json"

# Stage 4: Download cascade
download_cascade:
  - live_cdn
  - direct_fetch
  - wayback_cdx_best
  - exhaustive
  - asset_rescue
