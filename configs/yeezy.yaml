name: yeezy
display_name: "YEEZY"
credit_line: "YEEZY"

domains:
  - yeezy.com
  - www.yeezy.com
  - vultures.yeezy.com
  - bully.yeezy.com
  - sply.yeezy.com

cdx_files:
  - /Users/salvatore/downloads/wayback_cdx_v2/yeezy_com_wayback.txt

project_dir: /Users/salvatore/Downloads/yeezy
transport_pkg: /Users/salvatore/Downloads/wayback_cdx_v2
cdn_tool: /Users/salvatore/downloads/cdn/app.sh

# Stage 1: URL classification
url_rules:
  - path_prefix: "/products/"
    url_type: slug
    require_status: "200"
    require_ctype:
      - "text/html"
      - "application/json"

junk_patterns:
  - '%22|%3[CcEe]|%7[Bb]|%5[Bb]|%0A|undefined|wpm@|sandbox/modern|=center|=fast|=pad|=100|=80|=16|=375|=560|\.js$'

# Stage 1: Era detection
era_rules:
  - condition: "timestamp_year <= 2022"
    era: pre_shopify
  - condition: "default"
    era: shopify

type_priority:
  - slug

# Stage 2: CDN patterns
cdn_patterns:
  - name: shopify_files
    regex: 'https?://(?:cdn\.shopify\.com/s/files/[^\s"''\\]+|(?:yeezy\.com|vultures\.yeezy\.com|bully\.yeezy\.com|sply\.yeezy\.com)/cdn/shop/(?:files|products)/[^\s"''\\]+\.(?:png|jpg|jpeg|webp|gif|avif))'
  - name: shopify_classic
    regex: 'https?://cdn\.shopify\.com/s/files/[^\s"''\\]+/products/[^\s"''\\]+'
    size_strip: '_(?:\d+|\{width\})x(?:@\dx)?(?=\.\w+)'
    named_size_strip: '_(?:grande|medium|small|large|compact|master|pico|icon|thumb)(?=\.\w+)'

# Stage 2: Catalog API
catalog_api_patterns:
  - "/products.json"

# Stage 4: Download cascade
download_cascade:
  - live_cdn
  - direct_fetch
  - wayback_cdx_best
  - exhaustive
